name: Daily README commits

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure git
        run: |
          git config user.name "auto-bot"
          git config user.email "YOUR_GITHUB_EMAIL"

      - name: Make commits
        run: |
          for i in 1 2 3
          do
            echo "update $(date) $RANDOM" >> README.md
            git add README.md
            git commit -m "auto: update $i" || echo "no change"
          done

      - name: Push
        run: git push
